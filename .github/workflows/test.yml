name: Smart Contract CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        run: |
          curl -L https://foundry.paradigm.xyz | bash
          /home/runner/.foundry/bin/foundryup
          echo "/home/runner/.foundry/bin" >> $GITHUB_PATH

      - name: Debug PATH
        run: |
          which forge || echo "forge not found"
          ls /home/runner/.foundry/bin

      - name: Run tests (no fork)
        run: /home/runner/.foundry/bin/forge test -vv \
          --no-match-path "test/Fork.t.sol|test/UniswapFork.t.sol"