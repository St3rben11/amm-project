name: Smart Contract CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ ОФИЦИАЛЬНАЯ УСТАНОВКА FOUNDRY
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      # ✅ ПРОВЕРКА
      - name: Check forge
        run: forge --version

      # ✅ ТЕСТЫ (без fork)
      - name: Run tests
        run: forge test -vv --no-match-path "test/Fork.t.sol|test/UniswapFork.t.sol"