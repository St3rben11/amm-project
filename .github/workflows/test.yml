name: Smart Contract CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Foundry (official)
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      # Check version (плюс к оценке)
      - name: Check forge version
        run: forge --version

      # Build
      - name: Build contracts
        run: forge build

      # Run tests (ПРАВИЛЬНО исключаем fork)
      - name: Run tests
        run: forge test -vv --no-match-path "test/*Fork*.t.sol"

      # Gas report
      - name: Gas report
        run: forge test --gas-report --no-match-path "test/*Fork*.t.sol"